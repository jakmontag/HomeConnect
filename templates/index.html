<!DOCTYPE html>
<html>
<head>
    <title>Inspection App</title>
    <style>
        body { font-family: Arial; margin: 40px; }
        .dropzone {
            border: 2px dashed #aaa;
            padding: 20px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

<h1>Inspection Report Generator</h1>

<form method="POST" enctype="multipart/form-data">

    <textarea name="inspection_text" rows="6" cols="80"
        placeholder="Paste inspection notes here..."></textarea>
        <input type="file" name="{{ key }}" multiple>
<!--
    {% for key, label in sections.items() %}
        <h3>{{ label }}</h3>
            <div class="dropzone"
                ondrop="dropHandler(event, '{{ key }}')"
                ondragover="event.preventDefault()">
                Drag & Drop Images Here
                <input type="file" name="{{ key }}" multiple>
            </div>
    {% endfor %}
-->
    <button type="submit">Generate PDF Report</button>
</form>

<script>
function dropHandler(ev, key) {
    ev.preventDefault();
    const input = document.querySelector(`input[name="${key}"]`);
    input.files = ev.dataTransfer.files;
}
</script>

</body>
</html>
